<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>家具资讯 - 冠城 GCSOFA</title>
    <link rel="icon" type="image/png" href="assets/gcsofa-logo-transparent.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="冠城 GCSOFA 首页">
        <img class="brand-logo" src="assets/gcsofa-logo-transparent.png" alt="欣冠城 GCSOFA 标志" />
        <span>
          <strong>冠城</strong>
          <small>GCSOFA · 全球家具资讯</small>
        </span>
      </a>

      <nav class="nav" aria-label="家具资讯导航">
        <a href="index.html">首页</a>
        <div class="nav-dropdown">
          <a class="nav-trigger" href="index.html#products">产品</a>
          <div class="dropdown-menu" aria-label="产品分类">
            <a href="index.html#products">欧洲款式</a>
            <a href="index.html#products">日本款式</a>
            <a href="index.html#products">中东款式</a>
            <a href="index.html#products">拉美款式</a>
          </div>
        </div>
        <a href="factory.html">工厂介绍</a>
        <a href="news.html">家具资讯</a>
        <a id="progressNavLink" class="hidden" href="progress.html">生产进度</a>
        <a id="adminNavLink" class="hidden" href="admin.html">后台</a>
        <a href="contact.html">联系</a>
      </nav>

      <div class="account-bar">
        <span id="accountStatus" class="account-status">未登录</span>
        <button id="loginOpenBtn" class="button button-primary" type="button">登录</button>
        <button id="logoutBtn" class="button button-ghost hidden" type="button">退出</button>
      </div>
    </header>

    <main class="section news-page">
      <div class="section-heading">
        <p class="eyebrow">Global Furniture News</p>
        <h1>家具资讯</h1>
        <p>链接全球家具行业动态、出口政策、新材料、沙发设计、展会、市场与渠道资讯，按发布时间最新置顶。</p>
      </div>

      <div class="news-toolbar">
        <button id="refreshNewsBtn" class="button button-primary" type="button">刷新资讯</button>
        <span id="newsRefreshStatus">左侧为全球家具资讯，右侧为国内家具资讯，覆盖出口政策、新材料、沙发设计、展会、外贸与市场动态。</span>
      </div>

      <div class="news-columns">
        <section class="news-column" aria-label="全球资讯">
          <div class="panel-head">
            <h2>全球资讯</h2>
          </div>
          <div id="globalNewsFeed" class="news-feed"></div>
        </section>

        <section class="news-column" aria-label="国内资讯">
          <div class="panel-head">
            <h2>国内资讯</h2>
          </div>
          <div id="chinaNewsFeed" class="news-feed"></div>
        </section>
      </div>

      <div id="newsLoader" class="news-loader">下滑加载更多资讯</div>
    </main>

    <dialog id="loginDialog" class="dialog">
      <form id="loginForm" class="dialog-card" method="dialog">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">Account</p>
            <h2>帐号登录</h2>
          </div>
          <button class="icon-button" value="cancel" aria-label="关闭登录窗口" type="button" data-close-login>×</button>
        </div>
        <label>
          <span>帐号</span>
          <input id="usernameInput" name="username" autocomplete="username" required />
        </label>
        <label>
          <span>密码</span>
          <input id="passwordInput" name="password" type="password" autocomplete="current-password" required />
        </label>
        <p id="loginMessage" class="form-message" role="status"></p>
        <button class="button button-primary button-full" type="submit">登录</button>
      </form>
    </dialog>

    <script src="data.js?v=20260602-cloud-sync"></script>
    <script src="auth.js"></script>
    <script src="news.js?v=20260603-news-details"></script>
  </body>
</html>
