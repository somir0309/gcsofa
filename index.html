<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>欣冠城 GCSOFA｜沙发产品目录</title>

    <meta property="og:type" content="website" />
    <meta property="og:locale" content="zh_CN" />
    <meta property="og:site_name" content="欣冠城 GCSOFA" />
    <meta property="og:title" content="欣冠城 GCSOFA｜沙发产品目录" />
    <meta property="og:description" content="浏览欣冠城沙发产品、场景效果与产品资料，快速联系业务团队。" />
    <meta property="og:image" content="https://cn.gcsofa.com/assets/gcsofa-share-cover.jpg" />
    <meta property="og:image:secure_url" content="https://cn.gcsofa.com/assets/gcsofa-share-cover.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="600" />
    <meta property="og:image:height" content="450" />
    <meta itemprop="name" content="欣冠城 GCSOFA｜沙发产品目录" />
    <meta itemprop="description" content="浏览欣冠城沙发产品、场景效果与产品资料，快速联系业务团队。" />
    <meta itemprop="image" content="https://cn.gcsofa.com/assets/gcsofa-share-cover.jpg" />
    <link rel="image_src" href="https://cn.gcsofa.com/assets/gcsofa-share-cover.jpg" />
    <link rel="preload" as="image" href="assets/boucle-wave-home-mobile.webp" media="(max-width: 700px)" />
    <link rel="preload" as="image" href="assets/boucle-wave-home.webp" media="(min-width: 701px)" />
    <style>
      :root {
        --paper: #faf9f5;
        --ink: #111111;
        font-family: Georgia, "Times New Roman", "Songti SC", serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        background:
          linear-gradient(rgba(250, 249, 245, 0.08), rgba(250, 249, 245, 0.08)),
          url("assets/boucle-wave-home.webp") center / cover no-repeat;
        color: var(--ink);
      }

      main {
        position: relative;
        display: grid;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        place-items: center;
        isolation: isolate;
      }

      main::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -2;
        background:
          radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.56), transparent 32%),
          linear-gradient(90deg, rgba(255, 255, 255, 0.2), transparent 18%, transparent 82%, rgba(17, 17, 17, 0.08));
        pointer-events: none;
      }

      main::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        background:
          radial-gradient(circle at 50% 46%, rgba(255, 255, 255, 0.16), transparent 34%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.12), transparent 46%, rgba(17, 17, 17, 0.05));
        opacity: 0.48;
        mix-blend-mode: screen;
        pointer-events: none;
      }

      .home-lockup {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: clamp(22px, 4vw, 42px);
      }

      .wordmark {
        display: flex;
        align-items: baseline;
        justify-content: center;
        min-width: min(92vw, 1280px);
        font-size: clamp(72px, 15vw, 220px);
        font-weight: 400;
        letter-spacing: -0.04em;
        line-height: 0.82;
        user-select: none;
      }

      .wordmark span {
        display: inline-block;
        opacity: 0;
        transform: translate3d(calc(1.18em + var(--x)), var(--y), 0) rotate(var(--r));
        transform-origin: 50% 74%;
        filter: blur(5px);
        animation: letter-arrive 1250ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: calc(120ms + var(--i) * 115ms);
        will-change: transform, opacity, filter;
      }

      .wordmark.is-settled span {
        animation: none;
        opacity: 1;
        filter: none;
        transform: translate3d(0, 0, 0) rotate(0deg);
        transition:
          transform 520ms cubic-bezier(0.16, 1, 0.3, 1),
          letter-spacing 520ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      .wordmark:hover.is-settled span {
        transform: translate3d(0, -0.045em, 0);
      }

      .wordmark:hover.is-settled span:nth-child(2),
      .wordmark:hover.is-settled span:nth-child(5) {
        transform: translate3d(0, 0.035em, 0);
      }

      .wordmark::after {
        content: "";
        position: fixed;
        left: 50%;
        bottom: clamp(22px, 4vw, 54px);
        width: 28px;
        height: 1px;
        background: currentColor;
        opacity: 0;
        transform: translateX(-50%) scaleX(0.2);
        animation: cue-in 800ms ease forwards;
        animation-delay: 1650ms;
      }

      .language-choice {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: clamp(22px, 4vw, 44px);
        opacity: 0;
        animation: cue-in 800ms ease forwards;
        animation-delay: 1780ms;
        font-family: Arial, "Microsoft YaHei", sans-serif;
        font-size: clamp(22px, 3vw, 38px);
        font-weight: 800;
        letter-spacing: 0;
      }

      .language-choice a {
        color: inherit;
        text-decoration: none;
        border-bottom: 2px solid transparent;
        padding: 10px 4px;
        outline-offset: 8px;
        text-shadow: 0 2px 14px rgba(255, 255, 255, 0.72);
      }

      .language-choice a:hover,
      .language-choice a:focus-visible {
        border-bottom-color: currentColor;
      }

      .home-icp-footer {
        position: fixed;
        left: 50%;
        bottom: 8px;
        z-index: 2;
        transform: translateX(-50%);
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 6px 14px;
        width: calc(100% - 24px);
        font-family: Arial, "Microsoft YaHei", sans-serif;
        font-size: 12px;
        line-height: 1.4;
        opacity: 0.62;
      }

      .home-icp-footer a {
        color: inherit;
        text-decoration: none;
      }

      .home-icp-footer a:hover,
      .home-icp-footer a:focus-visible {
        text-decoration: underline;
      }

      .home-icp-footer .police-filing {
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }

      .home-icp-footer .police-filing img {
        width: 18px;
        height: 18px;
        object-fit: contain;
      }

      @keyframes letter-arrive {
        0% {
          opacity: 0;
          transform: translate3d(calc(1.18em + var(--x)), var(--y), 0) rotate(var(--r));
          filter: blur(5px);
        }
        46% {
          opacity: 1;
          filter: blur(0.6px);
        }
        72% {
          transform: translate3d(-0.055em, calc(var(--y) * -0.18), 0) rotate(calc(var(--r) * -0.16));
        }
        100% {
          opacity: 1;
          transform: translate3d(0, 0, 0) rotate(0deg);
          filter: blur(0);
        }
      }

      @keyframes cue-in {
        to {
          opacity: 0.38;
          transform: scaleX(1);
        }
      }

      @media (max-width: 700px) {
        body {
          background:
            linear-gradient(rgba(250, 249, 245, 0.08), rgba(250, 249, 245, 0.08)),
            url("assets/boucle-wave-home-mobile.webp") center / cover no-repeat;
        }

        .wordmark {
          min-width: 100vw;
          font-size: clamp(56px, 19vw, 104px);
          letter-spacing: -0.045em;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .wordmark span,
        .wordmark::after {
          animation: none;
          opacity: 1;
          filter: none;
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <main aria-label="GCSOFA language selection">
      <div class="home-lockup">
        <div class="wordmark" aria-hidden="true">
          <span style="--i: 0; --x: 0.42em; --y: -0.02em; --r: 0.8deg">G</span>
          <span style="--i: 1; --x: 0.34em; --y: 0.015em; --r: -0.6deg">C</span>
          <span style="--i: 2; --x: 0.26em; --y: -0.01em; --r: 0.5deg">S</span>
          <span style="--i: 3; --x: 0.18em; --y: 0.015em; --r: -0.5deg">O</span>
          <span style="--i: 4; --x: 0.1em; --y: -0.012em; --r: 0.4deg">F</span>
          <span style="--i: 5; --x: 0.02em; --y: 0.01em; --r: -0.4deg">A</span>
        </div>
        <nav class="language-choice" aria-label="Language selection">
          <a href="https://cn.gcsofa.com/products.html">中文</a>
          <a href="https://en.gcsofa.com/">ENGLISH</a>
        </nav>
      </div>
    </main>
    <footer class="home-icp-footer">
      <a href="https://beian.miit.gov.cn" target="_blank" rel="noopener noreferrer">粤ICP备2026092798号</a>
      <a class="police-filing" href="https://beian.mps.gov.cn/#/query/webSearch?code=44130302100390" rel="noreferrer" target="_blank"><img src="assets/public-security-filing.png" alt="" width="18" height="18" />粤公网安备44130302100390号</a>
    </footer>
    <script>
      if (location.hash === "#products") {
        location.replace("https://cn.gcsofa.com/products.html");
      }

      const wordmark = document.querySelector(".wordmark");
      window.setTimeout(() => wordmark.classList.add("is-settled"), 1900);
    </script>
  </body>
</html>
