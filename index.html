<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GCSOFA</title>
    <link rel="preload" as="image" href="assets/boucle-wave-home-mobile.webp" media="(max-width: 700px)" />
    <link rel="preload" as="image" href="assets/boucle-wave-home.webp" media="(min-width: 701px)" />
    <style>
      :root {
        --paper: #faf9f5;
        --ink: #111111;
        font-family: Georgia, "Times New Roman", "Songti SC", serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        background:
          linear-gradient(rgba(250, 249, 245, 0.08), rgba(250, 249, 245, 0.08)),
          url("assets/boucle-wave-home.webp") center / cover no-repeat;
        color: var(--ink);
      }

      main {
        position: relative;
        display: grid;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        place-items: center;
        isolation: isolate;
        cursor: pointer;
      }

      main::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -2;
        background:
          radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.56), transparent 32%),
          linear-gradient(90deg, rgba(255, 255, 255, 0.2), transparent 18%, transparent 82%, rgba(17, 17, 17, 0.08));
        pointer-events: none;
      }

      main::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        background:
          radial-gradient(circle at 50% 46%, rgba(255, 255, 255, 0.16), transparent 34%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.12), transparent 46%, rgba(17, 17, 17, 0.05));
        opacity: 0.48;
        mix-blend-mode: screen;
        pointer-events: none;
      }

      .wordmark-link {
        color: inherit;
        text-decoration: none;
        outline-offset: 18px;
      }

      .wordmark {
        display: flex;
        align-items: baseline;
        justify-content: center;
        min-width: min(92vw, 1280px);
        font-size: clamp(72px, 15vw, 220px);
        font-weight: 400;
        letter-spacing: -0.04em;
        line-height: 0.82;
        user-select: none;
      }

      .wordmark span {
        display: inline-block;
        opacity: 0;
        transform: translate3d(calc(1.18em + var(--x)), var(--y), 0) rotate(var(--r));
        transform-origin: 50% 74%;
        filter: blur(5px);
        animation: letter-arrive 1250ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: calc(120ms + var(--i) * 115ms);
        will-change: transform, opacity, filter;
      }

      .wordmark.is-settled span {
        animation: none;
        opacity: 1;
        filter: none;
        transform: translate3d(0, 0, 0) rotate(0deg);
        transition:
          transform 520ms cubic-bezier(0.16, 1, 0.3, 1),
          letter-spacing 520ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      .wordmark-link:hover .wordmark.is-settled span,
      .wordmark-link:focus-visible .wordmark.is-settled span {
        transform: translate3d(0, -0.045em, 0);
      }

      .wordmark-link:hover .wordmark.is-settled span:nth-child(2),
      .wordmark-link:focus-visible .wordmark.is-settled span:nth-child(2),
      .wordmark-link:hover .wordmark.is-settled span:nth-child(5),
      .wordmark-link:focus-visible .wordmark.is-settled span:nth-child(5) {
        transform: translate3d(0, 0.035em, 0);
      }

      .wordmark::after {
        content: "";
        position: fixed;
        left: 50%;
        bottom: clamp(22px, 4vw, 54px);
        width: 28px;
        height: 1px;
        background: currentColor;
        opacity: 0;
        transform: translateX(-50%) scaleX(0.2);
        animation: cue-in 800ms ease forwards;
        animation-delay: 1650ms;
      }

      @keyframes letter-arrive {
        0% {
          opacity: 0;
          transform: translate3d(calc(1.18em + var(--x)), var(--y), 0) rotate(var(--r));
          filter: blur(5px);
        }
        46% {
          opacity: 1;
          filter: blur(0.6px);
        }
        72% {
          transform: translate3d(-0.055em, calc(var(--y) * -0.18), 0) rotate(calc(var(--r) * -0.16));
        }
        100% {
          opacity: 1;
          transform: translate3d(0, 0, 0) rotate(0deg);
          filter: blur(0);
        }
      }

      @keyframes cue-in {
        to {
          opacity: 0.38;
          transform: translateX(-50%) scaleX(1);
        }
      }

      @media (max-width: 700px) {
        body {
          background:
            linear-gradient(rgba(250, 249, 245, 0.08), rgba(250, 249, 245, 0.08)),
            url("assets/boucle-wave-home-mobile.webp") center / cover no-repeat;
        }

        .wordmark {
          min-width: 100vw;
          font-size: clamp(56px, 19vw, 104px);
          letter-spacing: -0.045em;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .wordmark span,
        .wordmark::after {
          animation: none;
          opacity: 1;
          filter: none;
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <main id="homeEnter" role="link" tabindex="0" aria-label="进入 GCSOFA 产品目录">
      <a class="wordmark-link" href="products.html" aria-label="Enter GCSOFA product catalog">
        <div class="wordmark" aria-hidden="true">
          <span style="--i: 0; --x: 0.42em; --y: -0.02em; --r: 0.8deg">G</span>
          <span style="--i: 1; --x: 0.34em; --y: 0.015em; --r: -0.6deg">C</span>
          <span style="--i: 2; --x: 0.26em; --y: -0.01em; --r: 0.5deg">S</span>
          <span style="--i: 3; --x: 0.18em; --y: 0.015em; --r: -0.5deg">O</span>
          <span style="--i: 4; --x: 0.1em; --y: -0.012em; --r: 0.4deg">F</span>
          <span style="--i: 5; --x: 0.02em; --y: 0.01em; --r: -0.4deg">A</span>
        </div>
      </a>
    </main>
    <script>
      if (location.hash === "#products") {
        location.replace("products.html");
      }

      const wordmark = document.querySelector(".wordmark");
      window.setTimeout(() => wordmark.classList.add("is-settled"), 1900);

      const homeEnter = document.querySelector("#homeEnter");
      const enterProducts = () => {
        location.href = "products.html";
      };
      homeEnter.addEventListener("click", enterProducts);
      homeEnter.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          enterProducts();
        }
      });
    </script>
  </body>
</html>
